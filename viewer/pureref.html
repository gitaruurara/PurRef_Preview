<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>PureRef Viewer</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			overflow: hidden;
			background: #1e1e1e;
			font-family: Arial, sans-serif;
		}

		#container {
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
		}

		#toolbar {
			background: #2d2d2d;
			padding: 10px;
			border-bottom: 1px solid #444;
			color: #fff;
			font-size: 12px;
		}

		#toolbar span {
			margin-right: 20px;
		}

		#viewer-wrapper {
			flex: 1;
			overflow: auto;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		#viewer {
			pointer-events: auto;
			cursor: grab;
		}

		#viewer:active {
			cursor: grabbing;
		}
	</style>
</head>
<body>
	<div id="container">
		<div id="toolbar">
			<span>Zoom: <span id="zoomLevel">100%</span></span>
			<span>Scroll: マウスホイール | Pan: ドラッグ</span>
		</div>
		<div id="viewer-wrapper">
			<img id="viewer" alt="PureRef scene preview" src=""/>
		</div>
	</div>

	<script>
		const urlParams = new URLSearchParams(window.location.search);
		const filePath = urlParams.get('path');

		const viewer = document.querySelector('#viewer');
		const wrapper = document.querySelector('#viewer-wrapper');
		const zoomLevelDisplay = document.querySelector('#zoomLevel');

		let zoomLevel = 1;
		let isPanning = false;
		let panStartX = 0;
		let panStartY = 0;
		let panStartScrollLeft = 0;
		let panStartScrollTop = 0;

		// ズーム機能
		wrapper.addEventListener('wheel', (e) => {
			e.preventDefault();

			const delta = e.deltaY > 0 ? 0.9 : 1.1;
			zoomLevel *= delta;
			zoomLevel = Math.max(0.1, Math.min(5, zoomLevel)); // 10% - 500%

			updateZoom();
		});

		// パン機能
		viewer.addEventListener('mousedown', (e) => {
			isPanning = true;
			panStartX = e.clientX;
			panStartY = e.clientY;
			panStartScrollLeft = wrapper.scrollLeft;
			panStartScrollTop = wrapper.scrollTop;
		});

		document.addEventListener('mousemove', (e) => {
			if (!isPanning) return;

			wrapper.scrollLeft = panStartScrollLeft - (e.clientX - panStartX);
			wrapper.scrollTop = panStartScrollTop - (e.clientY - panStartY);
		});

		document.addEventListener('mouseup', () => {
			isPanning = false;
		});

		function updateZoom() {
			viewer.style.width = (viewer.naturalWidth * zoomLevel) + 'px';
			viewer.style.height = (viewer.naturalHeight * zoomLevel) + 'px';
			zoomLevelDisplay.textContent = Math.round(zoomLevel * 100) + '%';
		}

		// 1. Load the thumbnail image first
		const thumbnailPath = filePath.replace(".pur", "_thumbnail.png");
		viewer.src = thumbnailPath;
		console.log('[PureRef Viewer] Loading thumbnail:', thumbnailPath);
		viewer.onload = () => {
			updateZoom();
		};
	</script>
</body>
</html>
