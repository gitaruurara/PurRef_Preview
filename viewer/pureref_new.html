<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>PureRef Viewer</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			overflow: hidden;
			background: #1e1e1e;
			font-family: Arial, sans-serif;
		}

		#container {
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
		}

		#toolbar {
			background: #2d2d2d;
			padding: 10px;
			border-bottom: 1px solid #444;
			color: #fff;
			font-size: 12px;
		}

		#toolbar span {
			margin-right: 20px;
		}

		#viewer-wrapper {
			flex: 1;
			overflow: auto;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		#viewer {
			pointer-events: auto;
			cursor: grab;
		}

		#viewer:active {
			cursor: grabbing;
		}
	</style>
</head>
<body>
	<div id="container">
		<div id="toolbar">
			<span>Zoom: <span id="zoomLevel">100%</span></span>
			<span>Scroll: マウスホイール | Pan: ドラッグ</span>
		</div>
		<div id="viewer-wrapper">
			<img id="viewer" alt="PureRef scene preview" src=""/>
		</div>
	</div>

	<script>
		const urlParams = new URLSearchParams(window.location.search);
		const filePath = urlParams.get('path');

		const viewer = document.querySelector('#viewer');
		const wrapper = document.querySelector('#viewer-wrapper');
		const zoomLevelDisplay = document.querySelector('#zoomLevel');

		let zoomLevel = 1;
		let isPanning = false;
		let panStartX = 0;
		let panStartY = 0;
		let panStartScrollLeft = 0;
		let panStartScrollTop = 0;

		// ズーム機能
		wrapper.addEventListener('wheel', (e) => {
			e.preventDefault();

			const delta = e.deltaY > 0 ? 0.9 : 1.1;
			zoomLevel *= delta;
			zoomLevel = Math.max(0.1, Math.min(5, zoomLevel)); // 10% - 500%

			updateZoom();
		});

		// パン機能
		viewer.addEventListener('mousedown', (e) => {
			isPanning = true;
			panStartX = e.clientX;
			panStartY = e.clientY;
			panStartScrollLeft = wrapper.scrollLeft;
			panStartScrollTop = wrapper.scrollTop;
		});

		document.addEventListener('mousemove', (e) => {
			if (!isPanning) return;

			wrapper.scrollLeft = panStartScrollLeft - (e.clientX - panStartX);
			wrapper.scrollTop = panStartScrollTop - (e.clientY - panStartY);
		});

		document.addEventListener('mouseup', () => {
			isPanning = false;
		});

		function updateZoom() {
			viewer.style.width = (viewer.naturalWidth * zoomLevel) + 'px';
			viewer.style.height = (viewer.naturalHeight * zoomLevel) + 'px';
			zoomLevelDisplay.textContent = Math.round(zoomLevel * 100) + '%';
		}

		// 1. Load the thumbnail image first
		viewer.src = filePath.replace(".pur", "_thumbnail.png");

		// 2. Load the file and replace with exported scene image
		(async function() {
			const pureref = require('./../js/pureref-util.js');
			const os = require('os');
			const path = require('path');

			// Generate a temporary export path for high-resolution display
			const tempDir = os.tmpdir();
			const fileName = path.basename(filePath, '.pur');
			const tempExportPath = path.join(tempDir, `${fileName}_preview_${Date.now()}.png`);

			try {
				console.log('[PureRef Viewer] Starting export...');
				console.log('[PureRef Viewer] Input:', filePath);
				console.log('[PureRef Viewer] Output:', tempExportPath);

				// Export at higher resolution for better viewing
				await pureref.exportPureRefThumbnail(filePath, tempExportPath, 2000, 2000);

				// Convert file path to data URL for display
				const fs = require('fs');
				const buffer = await fs.promises.readFile(tempExportPath);
				viewer.src = `data:image/png;base64,${buffer.toString('base64')}`;

				// Update zoom when image is loaded
				viewer.onload = () => {
					updateZoom();
				};

				console.log('[PureRef Viewer] Display successful!');

				// Clean up temporary file after loading
				setTimeout(() => {
					if (fs.existsSync(tempExportPath)) {
						fs.unlinkSync(tempExportPath);
						console.log('[PureRef Viewer] Cleaned up temporary file');
					}
				}, 2000);
			} catch (err) {
				console.error('[PureRef Viewer] Failed to export PureRef scene:', err);
				// Keep thumbnail if export fails
				console.log('[PureRef Viewer] Keeping thumbnail as fallback');
			}
		})();
	</script>
</body>
</html>
